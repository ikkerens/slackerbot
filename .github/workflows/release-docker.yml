name: Release docker image

on:
  push:
    tags:
      - '*.*.*'

# This release script assumes that;
# - A variable DOCKER_USERNAME is set in the repository variables
# - A secret DOCKER_PASSWORD is set in the repository secrets
env:
  IMAGE_NAME: ikkerens/slackerbot

jobs:
  build:
    permissions:
      id-token: write
      contents: read
      attestations: write

    strategy:
      matrix:
        include:
          - { platform: "linux/amd64", runner: "ubuntu-22.04", arch_suffix: "amd64" }
          - { platform: "linux/arm64", runner: "ubuntu-22.04-arm", arch_suffix: "arm64" }

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.arch_suffix }}
          build-args: |
            BUILD_TYPE=release

      - name: Attest Build Provenance
        if: github.event.repository.private == false
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  create-manifest:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          docker manifest create ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --amend ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            --amend ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          
          docker manifest create ${{ env.IMAGE_NAME }}:latest \
            --amend ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            --amend ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64

          docker manifest push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker manifest push ${{ env.IMAGE_NAME }}:latest